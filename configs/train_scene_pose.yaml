data:
  manifest_path: data/processed/windows/train.jsonl
  eval_manifest_path: data/processed/windows/val.jsonl
  window_size: 64
  stride: 16
  num_joints: 17
model:
  pose_dim: 3
  kinematic_dim: 12
  kinematic_feature_set: v2
  scene_dim: 8
  hidden_dim: 192
  num_heads: 6
  depth: 4
  dropout: 0.1
augmentation:
  temporal_jitter_frames: 4
  time_mask_prob: 0.25
  time_mask_max_frames: 6
  pose_noise_std: 0.012
  kinematic_noise_std: 0.01
  confidence_dropout_prob: 0.04
training:
  seed: 2026
  batch_size: 64
  epochs: 30
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  weight_decay: 0.0001
  risk_loss_weight: 0.3
  class_balance_beta: 0.999
  num_workers: 8
  pin_memory: true
  amp: true
  grad_clip_norm: 1.0
  scheduler: cosine
  balanced_sampling: true
  device: cuda
  output_dir: outputs/scene_pose_temporal
