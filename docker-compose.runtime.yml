services:
  huling-guard-runtime:
    build:
      context: .
      dockerfile: Dockerfile.runtime
      args:
        FRONTEND_BUILD_IMAGE: ${HULING_FRONTEND_BUILD_IMAGE:-node:20-alpine}
        RUNTIME_BASE_IMAGE: ${HULING_RUNTIME_BASE_IMAGE:-mcr.microsoft.com/devcontainers/python:1-3.10-bullseye}
        PIP_INDEX_URL: ${HULING_PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${HULING_PIP_EXTRA_INDEX_URL:-}
        TORCH_INDEX_URL: ${HULING_TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
        TORCH_VERSION: ${HULING_TORCH_VERSION:-2.5.1+cpu}
    container_name: huling-guard-runtime
    ports:
      - "${HULING_RUNTIME_PUBLIC_PORT:-18014}:8000"
    environment:
      HULING_DEVICE: "${HULING_DEVICE:-cpu}"
      PYTHONPATH: /app/src
    volumes:
      - ${HULING_RELEASE_DIR:-./runtime-release}:/runtime-release
      - ${HULING_RUNTIME_DATA_DIR:-./runtime-data}:/runtime-data
      - ${HULING_DEMO_DIR:-./runtime-demo}:/runtime-demo
      - ./src:/app/src:ro
      - ./frontend/dist:/app/frontend-dist:ro
    command:
      [
        "python",
        "-m",
        "huling_guard.cli",
        "serve-release",
        "--release-dir",
        "/runtime-release",
        "--archive-root",
        "/runtime-data/archive",
        "--demo-video-root",
        "/runtime-demo/videos",
        "--frontend-dist",
        "/app/frontend-dist",
        "--device",
        "${HULING_DEVICE:-cpu}",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]
